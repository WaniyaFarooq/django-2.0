{%extends "receipes/base.html" %}
{% block start %}


<h4> Ranks: {{qs.first.student.studentreportcard.first.student_rank}}</h4>

<h4> Total: {{t_m.marks__sum}} </h4>

<table class="table table-dark table-hover">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Name</th>
      <th scope="col">Subject</th>
      <th scope="col">Marks</th>
    </tr>
  </thead>
  <tbody>
     {% for mark in qs %}
    <tr>
      <th scope="row">1</th>
     
      <td>{{mark.student.student_name}}</td>
      <td>{{mark.subject.subject_name}}</td>
      <td>{{mark.marks}}</td>
    </tr>
 
     {% endfor %}
</table>

{% endblock %}
