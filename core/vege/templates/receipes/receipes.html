{% extends "receipes/base.html" %}
{% block start %}

<div class="container mt-5">

<form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <h3>Add Recipe</h3>
    <br>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Recipe name</label>
    <input type="text" name="receipe_name"  class="form-control" ></div>
  
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Recipe description</label>
    <textarea class="form-control" name="receipe_description" ></textarea></div>
  
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Recipe Image</label>
    <input type="file" name="recipe_image" class="form-control" ></div>
  
  <button type="submit" class="btn btn-success btn-primary">Add Recipe</button>
</form>

<table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">receipe Name</th>
      <th scope="col">receipe Description</th>
      <th scope="col">receipe Image</th>
    </tr>
  </thead>
  <tbody>
    {% for r in receipes %}
    <tr>
      <th scope="row">{{forloop.counter}}</th>
      <td>{{r.receipe_name}}</td>
      <td>{{r.receipe_description}}</td>
      <td>{{r.recipe_image}}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

</div>
{% endblock %}
